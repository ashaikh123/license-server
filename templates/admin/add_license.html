{% extends 'base.html' %}

{% block title %}Add License - License Server{% endblock %}

{% block content %}
<h2>Add License</h2>
<form method="post" class="mt-3">
  <div class="mb-3">
    <label for="user_id" class="form-label">User</label>
    <select class="form-select" id="user_id" name="user_id" required>
      <option value="" disabled selected>Select user</option>
      {% for user in users %}
      <option value="{{ user.id }}">{{ user.email }} ({{ user.organization.name }})</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label for="start_date" class="form-label">Start Date</label>
    <input type="date" class="form-control" id="start_date" name="start_date" />
  </div>
  <div class="mb-3">
    <label for="expiry_date" class="form-label">Expiry Date</label>
    <input type="date" class="form-control" id="expiry_date" name="expiry_date" />
  </div>
  <div class="mb-3">
    <label for="max_devices" class="form-label">Max Devices</label>
    <input type="number" class="form-control" id="max_devices" name="max_devices" value="1" min="1" />
  </div>
  <button type="submit" class="btn btn-success">Generate License</button>
  <a href="{{ url_for('admin.licenses') }}" class="btn btn-link">Cancel</a>
</form>
{% endblock %}
