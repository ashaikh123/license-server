{% extends 'base.html' %}

{% block title %}Edit Organisation - License Server{% endblock %}

{% block content %}
<h2>Edit Organisation</h2>
<form method="post" class="mt-3">
  <div class="mb-3">
    <label for="name" class="form-label">Organisation Name</label>
    <input type="text" class="form-control" id="name" name="name" value="{{ org.name }}" required />
  </div>
  <div class="mb-3">
    <label for="contact_person" class="form-label">Contact Person</label>
    <input type="text" class="form-control" id="contact_person" name="contact_person" value="{{ org.contact_person }}" />
  </div>
  <div class="mb-3">
    <label for="contact_email" class="form-label">Contact Email</label>
    <input type="email" class="form-control" id="contact_email" name="contact_email" value="{{ org.contact_email }}" />
  </div>
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" value="on" id="is_active" name="is_active" {% if org.is_active %}checked{% endif %} />
    <label class="form-check-label" for="is_active">Active</label>
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
  <a href="{{ url_for('admin.organizations') }}" class="btn btn-link">Cancel</a>
</form>
{% endblock %}
