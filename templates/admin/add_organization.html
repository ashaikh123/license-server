{% extends 'base.html' %}

{% block title %}Add Organisation - License Server{% endblock %}

{% block content %}
<h2>Add Organisation</h2>
<form method="post" class="mt-3">
  <div class="mb-3">
    <label for="name" class="form-label">Organisation Name</label>
    <input type="text" class="form-control" id="name" name="name" required />
  </div>
  <div class="mb-3">
    <label for="contact_person" class="form-label">Contact Person</label>
    <input type="text" class="form-control" id="contact_person" name="contact_person" />
  </div>
  <div class="mb-3">
    <label for="contact_email" class="form-label">Contact Email</label>
    <input type="email" class="form-control" id="contact_email" name="contact_email" />
  </div>
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" value="on" id="is_active" name="is_active" checked />
    <label class="form-check-label" for="is_active">Active</label>
  </div>
  <button type="submit" class="btn btn-success">Create</button>
  <a href="{{ url_for('admin.organizations') }}" class="btn btn-link">Cancel</a>
</form>
{% endblock %}
