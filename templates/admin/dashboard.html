{% extends 'base.html' %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<h2>Admin Dashboard</h2>

<div class="stats-grid">
    <div class="stat-card">
        <h4>Organisations</h4>
        <div class="number">{{ org_count }}</div>
    </div>

    <div class="stat-card">
        <h4>Users</h4>
        <div class="number">{{ user_count }}</div>
    </div>

    <div class="stat-card">
        <h4>Licenses</h4>
        <div class="number">{{ license_count }}</div>
    </div>

    <div class="stat-card">
        <h4>Devices</h4>
        <div class="number">{{ device_count }}</div>
    </div>
</div>
{% endblock %}
